<!DOCTYPE html>
<html>
<head>
    <title>Quick Tasks</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #222;
            color: #eee;
            margin: 0;
            padding: 15px;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 30px);
        }
        #search-bar {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #444;
            background-color: #333;
            color: #eee;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        #tasks-container {
            flex-grow: 1;
            overflow-y: auto;
        }
        .task-category {
            margin-bottom: 15px;
        }
        .category-title {
            font-size: 0.8em;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .task-item:hover {
            background-color: #3a3a3a;
        }
        .task-icon {
            font-size: 1.2em;
            margin-right: 10px;
        }
        .task-details {
            flex-grow: 1;
        }
        .task-name {
            font-weight: 500;
        }
        .task-subtitle {
            font-size: 0.8em;
            color: #888;
        }
        #ai-input-container {
            margin-top: 15px;
        }
        #ai-input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #444;
            background-color: #333;
            color: #eee;
            border-radius: 4px;
        }
        footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        footer button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
        }
        footer button:hover {
            color: #eee;
        }
    </style>
</head>
<body>
    <input type="text" id="search-bar" placeholder="Search tasks...">
    <div id="tasks-container"></div>
    <div id="ai-input-container">
        <input type="text" id="ai-input" placeholder="Ask Claude to do something...">
    </div>
    <footer>
        <button id="add-task-btn">+ Add task</button>
        <button id="settings-btn">Settings</button>
    </footer>
    <script src="popup.js"></script>
</body>
</html>
