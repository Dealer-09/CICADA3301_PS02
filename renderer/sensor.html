<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      cursor: default;
      -webkit-app-region: no-drag;
    }
    #sensor {
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="sensor"></div>
  <script>
    const sensor = document.getElementById('sensor');
    sensor.addEventListener('mouseenter', () => {
      window.perch.sensorHover();
    });
  </script>
</body>
</html>
